name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Security Tools
        run: pip install bandit safety

      - name: Run Bandit
        run: bandit -r . -x ./venv,./env,./tests #

      - name: Run Safety
        run: |
          if [ -f requirements.txt ]; then safety check --file requirements.txt; else echo "Pomijam safety - brak requirements.txt"; fi #
