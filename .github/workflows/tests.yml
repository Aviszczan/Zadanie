name: Continuous Integration

on:
  push:
    branches: [ main, master ] #
  pull_request:
    branches: [ main, master ] #

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true #

jobs:
  test:
    runs-on: ubuntu-latest #

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: django_db #
          POSTGRES_USER: django_user #
          POSTGRES_PASSWORD: django_password #
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7 #
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: "temporary-secret-key-for-testing"
      DATABASE_URL: postgres://django_user:django_password@localhost:5432/django_db
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' #
          cache: 'pip' #

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install django psycopg2-binary celery redis; fi #

      - name: Run Migrations
        run: python manage.py migrate #

      - name: Run Tests
        run: python manage.py test #
